<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国象棋</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>中国象棋</h1>
    <div class="game-info">
      <span id="turn-indicator">当前回合：<span id="current-turn">红方</span></span>
      <span id="status-message"></span>
      <span id="mode-indicator" style="font-size:12px; color:#999;">连接中...</span>
    </div>
    <div class="captured-area" id="captured-black">
      <span class="captured-label">黑方被吃：</span>
    </div>
    <div class="board-wrapper">
      <canvas id="chess-board" width="580" height="640"></canvas>
      <div id="chess-pieces"></div>
    </div>
    <div class="captured-area" id="captured-red">
      <span class="captured-label">红方被吃：</span>
    </div>
    <div class="controls">
      <button id="btn-restart">重新开始</button>
      <button id="btn-undo">悔棋</button>
    </div>
  </div>
  <script src="/static/chess.js"></script>
</body>
</html>
