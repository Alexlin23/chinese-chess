<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国象棋</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>中国象棋</h1>
    <div class="game-info">
      <span id="turn-indicator">当前回合：<span id="current-turn">红方</span></span>
      <span id="status-message"></span>
      <span id="mode-indicator" style="font-size:12px; color:#999;">连接中...</span>
    </div>
    <div class="captured-area" id="captured-black">
      <span class="captured-label">黑方被吃：</span>
    </div>
    <div class="board-wrapper">
      <canvas id="chess-board" width="580" height="640"></canvas>
      <div id="chess-pieces"></div>
    </div>
    <div class="captured-area" id="captured-red">
      <span class="captured-label">红方被吃：</span>
    </div>
    <div class="controls">
      <button id="btn-restart">重新开始</button>
      <button id="btn-undo">悔棋</button>
      <button id="btn-ai" style="background:#c0392b;color:#fff;">AI 走棋</button>
    </div>

    <!-- 自我对弈观战 -->
    <div class="self-play-panel" id="self-play-panel">
      <h3>🤖 神经网络自我对弈</h3>
      <div class="self-play-controls">
        <button id="btn-self-play-start">▶ 开始观战</button>
        <button id="btn-self-play-stop" disabled>⏹ 停止</button>
        <label class="speed-label">
          速度: <input type="range" id="self-play-speed" min="1" max="10" value="5" step="1">
          <span id="speed-display">5</span>
        </label>
      </div>
      <div class="self-play-stats">
        <span id="sp-status">就绪</span>
        <span id="sp-step">步数: 0</span>
        <span id="sp-winner" style="font-weight:bold;"></span>
      </div>
    </div>
  </div>
  <script src="/static/chess.js"></script>
</body>
</html>
