# 测试配置 — 基于 default，只改 games 和 iterations

model:
  blocks: 20
  filters: 256

mcts:
  simulations: 800
  c_puct: 1.5
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  batch_size: 128
  virtual_loss: 3.0

self_play:
  games: 2500             # 测试用，减少每轮游戏数
  max_ply: 512
  temperature_ply: 30

training:
  batch_size: 4096
  lr: 0.2
  lr_momentum: 0.9
  weight_decay: 0.0001
  epochs: 10
  replay_buffer: 1000000
  samples_per_epoch: 100000
  capture_reward: 0.3
  non_terminal_base_weight: 1.0
  terminal_weight: 2.0

arena:
  games: 40              # 快速验证（原10局统计噪声太大）
  threshold: 0.52        # 略高于50%，避免纯噪声晋升

parallel:
  workers: null
  inference_batch: 256
  inference_wait_ms: 10

system:
  checkpoint_dir: "AlphaZero/checkpoints"
  log_interval: 100
  save_interval: 1
  monitor_interval: 5

pipeline:
  max_iterations: 10      # 测试用，减少轮次
