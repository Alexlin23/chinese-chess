# 最小测试配置 — 快速验证闭环

model:
  blocks: 4
  filters: 32

mcts:
  simulations: 10
  c_puct: 1.5
  batch_size: 8

self_play:
  games: 16
  max_ply: 50
  temperature_ply: 10

training:
  batch_size: 32
  lr: 0.01
  lr_momentum: 0.9
  weight_decay: 0.0001
  epochs: 2
  replay_buffer: 5000
  samples_per_epoch: 1000

arena:
  games: 4
  threshold: 0.55

parallel:
  workers: 8
  inference_batch: 16
  inference_wait_ms: 3.0

system:
  checkpoint_dir: "AlphaZero/checkpoints_quick"
  monitor_interval: 3

pipeline:
  max_iterations: 2
